<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milky Way — Interactive Model</title>
<style>
  :root{
    --ink:#cfd6e4; --dim:#6b7385; --amber:#ffb45e; --line:rgba(207,214,228,.14);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#000}
  body{font-family:ui-monospace,'SF Mono','Cascadia Code',Menlo,Consolas,monospace;color:var(--ink)}
  #c{position:fixed;inset:0;display:block;cursor:grab}
  #c.dragging{cursor:grabbing}

  .hud{position:fixed;z-index:10;pointer-events:none}
  .hud *{pointer-events:auto}

  #title{top:22px;left:26px}
  #title h1{font-size:13px;font-weight:600;letter-spacing:.34em;color:var(--ink)}
  #title h1 span{color:var(--amber)}
  #title p{font-size:10px;letter-spacing:.12em;color:var(--dim);margin-top:6px}

  #panel{bottom:22px;left:26px;width:248px;border:1px solid var(--line);
    background:rgba(4,6,12,.66);backdrop-filter:blur(8px);padding:14px 16px}
  .row{display:flex;justify-content:space-between;align-items:center;margin:9px 0;font-size:10px;letter-spacing:.1em}
  .row label{color:var(--dim)}
  .row .val{color:var(--ink)}
  input[type=range]{-webkit-appearance:none;width:118px;height:2px;background:rgba(207,214,228,.25);outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:var(--amber);border-radius:50%;cursor:pointer}
  input[type=range]::-moz-range-thumb{width:10px;height:10px;background:var(--amber);border:none;border-radius:50%;cursor:pointer}
  .toggle{display:inline-block;border:1px solid var(--line);padding:3px 9px;font-size:9px;letter-spacing:.14em;
    color:var(--dim);cursor:pointer;user-select:none;transition:all .15s}
  .toggle.on{color:var(--amber);border-color:rgba(255,180,94,.5)}
  .toggle:hover{color:var(--ink)}
  #panel hr{border:none;border-top:1px solid var(--line);margin:11px 0}
  .btnrow{display:flex;gap:6px;flex-wrap:wrap}

  #readout{top:22px;right:26px;text-align:right;font-size:10px;letter-spacing:.12em;color:var(--dim);line-height:1.9}
  #readout b{color:var(--ink);font-weight:500}

  #help{bottom:22px;right:26px;text-align:right;font-size:9px;letter-spacing:.12em;color:var(--dim);line-height:1.9}
  #help em{color:var(--ink);font-style:normal}

  .label3d{position:fixed;z-index:5;pointer-events:none;font-size:9px;letter-spacing:.2em;
    color:var(--ink);text-shadow:0 0 6px #000;transform:translate(-50%,-130%);white-space:nowrap;opacity:.9}
  .label3d::after{content:'';display:block;width:1px;height:10px;background:rgba(207,214,228,.5);margin:3px auto 0}
  .label3d.amber{color:var(--amber)}
  .label3d.arm{color:var(--dim);font-size:8.5px}
  .label3d.arm::after{display:none}

  #fade{position:fixed;inset:0;background:#000;z-index:50;pointer-events:none;transition:opacity 2.2s ease}
  @media (max-width:640px){ #readout,#help{display:none} #panel{width:calc(100% - 52px)} }
  @media (prefers-reduced-motion:reduce){ #fade{transition:none} }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="fade"></div>

<div class="hud" id="title">
  <h1>MILKY WAY <span>///</span> INTERACTIVE MODEL</h1>
  <p>BARRED SPIRAL · SBbc · ~105,700 LY DIAMETER · ~200B STARS</p>
</div>

<div class="hud" id="panel">
  <div class="row">
    <label>GALACTIC ROTATION</label>
    <input type="range" id="speed" min="0" max="300" value="80">
  </div>
  <div class="row">
    <label>SPEED</label><span class="val" id="speedVal">80 Myr/s</span>
  </div>
  <hr>
  <div class="btnrow">
    <span class="toggle on" id="tLabels">LABELS</span>
    <span class="toggle on" id="tAuto">AUTO-ORBIT</span>
    <span class="toggle" id="tTop">TOP-DOWN</span>
    <span class="toggle" id="tSun">GO TO SUN</span>
  </div>
</div>

<div class="hud" id="readout">
  CAMERA ALTITUDE <b id="dist">—</b><br>
  SUN ORBIT <b>~230 Myr / rev</b><br>
  SUN → SGR A* <b>26,670 LY</b>
</div>

<div class="hud" id="help">
  <em>DRAG</em> ORBIT &nbsp; <em>SCROLL</em> ZOOM<br>
  <em>RIGHT-DRAG</em> PAN &nbsp; <em>DBL-CLICK</em> RESET
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* =========================================================
   MILKY WAY — scientifically-informed particle model
   scale: 1 unit = 1,000 light-years
   ========================================================= */
const UNIT = 1000; // ly per unit
const R_DISK = 52.85;        // ~105,700 ly diameter
const R_SUN  = 26.67;        // sun galactocentric distance
const BAR_HALF = 13.5;       // half-length of central bar (~27 kly long)
const BAR_ANGLE = THREE.MathUtils.degToRad(27); // bar vs sun-center line

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000003);
const camera = new THREE.PerspectiveCamera(55, 1, 0.05, 4000);

/* ---------- star sprite texture ---------- */
function makeSprite(){
  const s = 64, cv = document.createElement('canvas'); cv.width = cv.height = s;
  const g = cv.getContext('2d');
  const grad = g.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  grad.addColorStop(0,'rgba(255,255,255,1)');
  grad.addColorStop(0.18,'rgba(255,255,255,.85)');
  grad.addColorStop(0.45,'rgba(255,255,255,.18)');
  grad.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle = grad; g.fillRect(0,0,s,s);
  const t = new THREE.CanvasTexture(cv); t.needsUpdate = true; return t;
}
const spriteTex = makeSprite();

/* ---------- helpers ---------- */
const rand = (a,b)=>a+Math.random()*(b-a);
function gauss(){ let u=0,v=0; while(!u)u=Math.random(); while(!v)v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }

// stellar population palettes (r,g,b 0-1)
const COL = {
  O :[0.62,0.74,1.00], B:[0.72,0.82,1.00], A:[0.92,0.95,1.00],
  F :[1.00,0.97,0.92], G:[1.00,0.93,0.78], K:[1.00,0.82,0.60],
  M :[1.00,0.66,0.45], HII:[1.00,0.45,0.66], coreK:[1.00,0.84,0.58],
  halo:[0.85,0.70,0.62]
};
function diskColor(){ // field population mix
  const r = Math.random();
  if(r<0.04) return COL.A; if(r<0.20) return COL.F;
  if(r<0.55) return COL.G; if(r<0.85) return COL.K; return COL.M;
}

/* ---------- shader: differential rotation on GPU ----------
   flat rotation curve: v ≈ 230 km/s ⇒ ω(r) = v / max(r, r_core)
   uTime in Myr; 230 km/s ≈ 0.2352 kly/Myr                       */
const V_FLAT = 0.2352;   // kly per Myr
const R_CORE = 3.0;      // inner solid-body core radius

function makeGalaxyMaterial(extraFade){
  return new THREE.ShaderMaterial({
    uniforms:{
      uTime:{value:0}, uTex:{value:spriteTex}, uScale:{value:1}
    },
    vertexShader:`
      attribute float aRadius; attribute float aAngle; attribute float aY;
      attribute float aSize;   attribute vec3  aColor;
      uniform float uTime; uniform float uScale;
      varying vec3 vColor;
      void main(){
        float w = ${V_FLAT.toFixed(5)} / max(aRadius, ${R_CORE.toFixed(2)});
        float a = aAngle - uTime * w;
        vec3 p = vec3(aRadius * cos(a), aY, aRadius * sin(a));
        vec4 mv = modelViewMatrix * vec4(p, 1.0);
        gl_PointSize = aSize * uScale * (140.0 / -mv.z);
        gl_PointSize = clamp(gl_PointSize, 0.6, 26.0);
        vColor = aColor;
        gl_Position = projectionMatrix * mv;
      }`,
    fragmentShader:`
      uniform sampler2D uTex; varying vec3 vColor;
      void main(){
        vec4 t = texture2D(uTex, gl_PointCoord);
        gl_FragColor = vec4(vColor, t.a ${extraFade||''});
        if(gl_FragColor.a < 0.01) discard;
      }`,
    transparent:true, depthWrite:false, blending:THREE.AdditiveBlending
  });
}

/* ---------- buffer builder ---------- */
function buildPoints(n, fill, material){
  const radius = new Float32Array(n), angle = new Float32Array(n),
        ys = new Float32Array(n), size = new Float32Array(n),
        col = new Float32Array(n*3);
  for(let i=0;i<n;i++){
    const s = fill(i);             // {r, a, y, size, color}
    radius[i]=s.r; angle[i]=s.a; ys[i]=s.y; size[i]=s.size;
    col[i*3]=s.color[0]; col[i*3+1]=s.color[1]; col[i*3+2]=s.color[2];
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(n*3),3)); // dummy
  geo.setAttribute('aRadius', new THREE.BufferAttribute(radius,1));
  geo.setAttribute('aAngle',  new THREE.BufferAttribute(angle,1));
  geo.setAttribute('aY',      new THREE.BufferAttribute(ys,1));
  geo.setAttribute('aSize',   new THREE.BufferAttribute(size,1));
  geo.setAttribute('aColor',  new THREE.BufferAttribute(col,3));
  geo.boundingSphere = new THREE.Sphere(new THREE.Vector3(), R_DISK*2.4);
  const pts = new THREE.Points(geo, material);
  pts.frustumCulled = false;
  scene.add(pts);
  return pts;
}

/* =========================================================
   GALACTIC STRUCTURE
   four major arms (logarithmic spirals, pitch ≈ 12.5°)
   ========================================================= */
const PITCH = Math.tan(THREE.MathUtils.degToRad(12.5));
const ARMS = [   // phase offsets — Scutum-Centaurus & Perseus are dominant
  {phi:0.00,            w:1.00, name:'SCUTUM–CENTAURUS'},
  {phi:Math.PI,         w:1.00, name:'PERSEUS'},
  {phi:Math.PI*0.5,     w:0.62, name:'SAGITTARIUS'},
  {phi:Math.PI*1.5,     w:0.62, name:'NORMA'}
];
const armAngle = r => Math.log(r/3.2)/PITCH;   // unwinds from bar ends
const scaleH = r => 0.30 + 0.10*Math.max(0, (r-30)/22)*2.2; // thin disk + flare

const galaxyMat = makeGalaxyMaterial();

/* --- 1. spiral arm stars (incl. young blue OB + HII regions) --- */
buildPoints(96000, ()=>{
  const arm = ARMS[(Math.random()*4)|0];
  // density falls exponentially with radius
  let r; do { r = 4 + (-Math.log(1-Math.random()))*11; } while(r > R_DISK);
  const spread = 0.85 + r*0.035;
  const a = armAngle(r) + arm.phi + gauss()*spread*0.16/Math.max(arm.w,0.6);
  const rr = r + gauss()*spread*0.55;
  const y = gauss()*scaleH(rr)*0.5;
  const t = Math.random();
  let color, size;
  if(t < 0.055){ color = Math.random()<0.5?COL.O:COL.B; size = rand(2.4,4.2); }   // OB associations
  else if(t < 0.075){ color = COL.HII; size = rand(2.8,5.0); }                    // HII regions
  else { color = diskColor(); size = rand(0.8,2.0); }
  return {r:Math.max(rr,1.5), a, y, size, color};
}, galaxyMat);

/* --- 2. smooth inter-arm disk field --- */
buildPoints(52000, ()=>{
  let r; do { r = 3 + (-Math.log(1-Math.random()))*12; } while(r > R_DISK);
  return { r, a: Math.random()*Math.PI*2, y: gauss()*scaleH(r)*0.62,
           size: rand(0.6,1.5), color: diskColor() };
}, galaxyMat);

/* --- 3. central bar (older, yellow-orange population) --- */
buildPoints(26000, ()=>{
  // ellipsoid: long axis BAR_HALF, short 4.5, height 3
  const u = gauss()*0.42;
  const x = u*BAR_HALF, z = gauss()*0.32*4.5, y = gauss()*0.30*2.6;
  let r = Math.hypot(x,z), a = Math.atan2(z,x) + BAR_ANGLE;
  const mix = Math.random();
  const color = mix<0.7?COL.coreK : (mix<0.92?COL.K:COL.M);
  return { r:Math.max(r,0.25), a, y, size:rand(0.8,1.9), color };
}, galaxyMat);

/* --- 4. central bulge / nuclear cluster glow --- */
buildPoints(20000, ()=>{
  const d = Math.pow(Math.random(),2.4)*4.2 + 0.05;
  const th = Math.random()*Math.PI*2, ph = Math.acos(rand(-1,1));
  const x = d*Math.sin(ph)*Math.cos(th), z = d*Math.sin(ph)*Math.sin(th);
  const y = d*Math.cos(ph)*0.62;
  return { r:Math.max(Math.hypot(x,z),0.05), a:Math.atan2(z,x), y,
           size:rand(0.9,2.6), color: Math.random()<0.8?COL.coreK:COL.M };
}, galaxyMat);

/* --- 5. stellar halo + globular-cluster sprinkle (slow, dim) --- */
buildPoints(9000, ()=>{
  const d = 8 + Math.pow(Math.random(),1.6)*55;
  const th = Math.random()*Math.PI*2, ph = Math.acos(rand(-1,1));
  return { r:Math.max(d*Math.sin(ph),2), a:th, y:d*Math.cos(ph),
           size:rand(0.6,1.4),
           color:[COL.halo[0]*0.55, COL.halo[1]*0.55, COL.halo[2]*0.55] };
}, makeGalaxyMaterial('* 0.5'));

/* --- 6. core glow sprite --- */
(function(){
  const cv = document.createElement('canvas'); cv.width=cv.height=256;
  const g = cv.getContext('2d');
  const gr = g.createRadialGradient(128,128,0,128,128,128);
  gr.addColorStop(0,'rgba(255,236,200,.9)');
  gr.addColorStop(0.25,'rgba(255,200,130,.38)');
  gr.addColorStop(0.6,'rgba(255,160,90,.10)');
  gr.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=gr; g.fillRect(0,0,256,256);
  const m = new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),
    blending:THREE.AdditiveBlending, depthWrite:false, transparent:true});
  const sp = new THREE.Sprite(m); sp.scale.set(14,14,1); scene.add(sp);
})();

/* --- 7. distant background stars --- */
(function(){
  const n=3500, pos=new Float32Array(n*3), col=new Float32Array(n*3);
  for(let i=0;i<n;i++){
    const d=rand(600,1800), th=Math.random()*Math.PI*2, ph=Math.acos(rand(-1,1));
    pos[i*3]=d*Math.sin(ph)*Math.cos(th); pos[i*3+1]=d*Math.cos(ph); pos[i*3+2]=d*Math.sin(ph)*Math.sin(th);
    const c=diskColor(), b=rand(0.25,0.7);
    col[i*3]=c[0]*b; col[i*3+1]=c[1]*b; col[i*3+2]=c[2]*b;
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  g.setAttribute('color',new THREE.BufferAttribute(col,3));
  const m=new THREE.PointsMaterial({size:1.6,vertexColors:true,sizeAttenuation:false,
    map:spriteTex,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending});
  scene.add(new THREE.Points(g,m));
})();

/* --- Sun marker --- */
const sunMat = new THREE.SpriteMaterial({map:spriteTex, color:0xfff3c8,
  blending:THREE.AdditiveBlending, depthWrite:false, transparent:true});
const sunSprite = new THREE.Sprite(sunMat); sunSprite.scale.set(1.6,1.6,1);
scene.add(sunSprite);
const SUN_A0 = armAngle(R_SUN) + ARMS[2].phi + 0.18; // near Orion spur off Sagittarius arm
function sunPos(timeMyr, out){
  const w = V_FLAT/Math.max(R_SUN,R_CORE);
  const a = SUN_A0 - timeMyr*w;
  out.set(R_SUN*Math.cos(a), 0.06, R_SUN*Math.sin(a));
  return out;
}

/* =========================================================
   LABELS (projected HTML)
   ========================================================= */
const labels = [];
function addLabel(text, cls, getPos){
  const el = document.createElement('div');
  el.className = 'label3d '+(cls||''); el.textContent = text;
  document.body.appendChild(el);
  labels.push({el, getPos, v:new THREE.Vector3()});
}
addLabel('SGR A* · GALACTIC CENTER','amber', (t,v)=>v.set(0,0.3,0));
addLabel('SUN','', (t,v)=>sunPos(t,v));
ARMS.forEach((arm,i)=>{
  const r = i<2 ? 34 : 24;
  addLabel(arm.name+' ARM','arm',(t,v)=>{
    const w = 0.25*V_FLAT/Math.max(r,R_CORE);      // pattern speed (slower than stars)
    const a = armAngle(r)+arm.phi - t*w;
    return v.set(r*Math.cos(a), scaleH(r)+0.6, r*Math.sin(a));
  });
});

/* =========================================================
   CAMERA CONTROLS — orbit + pan + zoom + inertia
   ========================================================= */
const target = new THREE.Vector3(0,0,0);
let sph = { r: 95, theta: Math.PI*0.32, phi: Math.PI*0.36 }; // phi from +Y
let sphGoal = {...sph};
const targetGoal = target.clone();
let autoOrbit = true, userIdle = 0;

function applyCamera(){
  sph.r += (sphGoal.r - sph.r)*0.08;
  sph.theta += (sphGoal.theta - sph.theta)*0.10;
  sph.phi += (sphGoal.phi - sph.phi)*0.10;
  target.lerp(targetGoal, 0.08);
  const sp = Math.sin(sph.phi);
  camera.position.set(
    target.x + sph.r*sp*Math.cos(sph.theta),
    target.y + sph.r*Math.cos(sph.phi),
    target.z + sph.r*sp*Math.sin(sph.theta));
  camera.lookAt(target);
}

let dragging = false, panning = false, px=0, py=0;
canvas.addEventListener('pointerdown', e=>{
  dragging = e.button===0; panning = e.button===2;
  px=e.clientX; py=e.clientY; userIdle=0;
  canvas.classList.add('dragging'); canvas.setPointerCapture(e.pointerId);
});
addEventListener('pointerup', ()=>{dragging=panning=false; canvas.classList.remove('dragging');});
addEventListener('pointermove', e=>{
  if(!dragging && !panning) return;
  const dx=e.clientX-px, dy=e.clientY-py; px=e.clientX; py=e.clientY; userIdle=0;
  if(dragging){
    sphGoal.theta += dx*0.005;
    sphGoal.phi = THREE.MathUtils.clamp(sphGoal.phi + dy*0.005, 0.03, Math.PI-0.03);
  } else {
    const k = sph.r*0.0012;
    const right = new THREE.Vector3().subVectors(camera.position,target).cross(camera.up).normalize();
    const up = new THREE.Vector3().crossVectors(right, new THREE.Vector3().subVectors(camera.position,target)).normalize();
    targetGoal.addScaledVector(right, dx*k).addScaledVector(up, -dy*k);
  }
});
canvas.addEventListener('wheel', e=>{
  e.preventDefault(); userIdle=0;
  sphGoal.r = THREE.MathUtils.clamp(sphGoal.r * (1 + Math.sign(e.deltaY)*0.10), 1.2, 900);
},{passive:false});
canvas.addEventListener('contextmenu', e=>e.preventDefault());
canvas.addEventListener('dblclick', ()=>{
  sphGoal = {r:95, theta:Math.PI*0.32, phi:Math.PI*0.36};
  targetGoal.set(0,0,0); userIdle=0;
});
// touch pinch
let pinch0 = 0;
canvas.addEventListener('touchmove', e=>{
  if(e.touches.length===2){
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                         e.touches[0].clientY-e.touches[1].clientY);
    if(pinch0) sphGoal.r = THREE.MathUtils.clamp(sphGoal.r*pinch0/d, 1.2, 900);
    pinch0 = d; userIdle=0;
  }
},{passive:true});
canvas.addEventListener('touchend', ()=>pinch0=0);

/* =========================================================
   UI
   ========================================================= */
let speedMyrPerSec = 80, showLabels = true;
const $ = id=>document.getElementById(id);
$('speed').addEventListener('input', e=>{
  speedMyrPerSec = +e.target.value;
  $('speedVal').textContent = speedMyrPerSec + ' Myr/s';
});
$('tLabels').addEventListener('click', e=>{
  showLabels = !showLabels; e.target.classList.toggle('on', showLabels);
});
$('tAuto').addEventListener('click', e=>{
  autoOrbit = !autoOrbit; e.target.classList.toggle('on', autoOrbit);
});
$('tTop').addEventListener('click', ()=>{
  sphGoal.phi = 0.06; sphGoal.theta = Math.PI*0.5; sphGoal.r = 120;
  targetGoal.set(0,0,0); userIdle = -8;
});
$('tSun').addEventListener('click', ()=>{
  const v = sunPos(simTime, new THREE.Vector3());
  targetGoal.copy(v); sphGoal.r = 6; sphGoal.phi = Math.PI*0.42; userIdle = -8;
});

/* =========================================================
   LOOP
   ========================================================= */
const materials = [];
scene.traverse(o=>{ if(o.material && o.material.uniforms && o.material.uniforms.uTime) materials.push(o.material); });

let simTime = 0, last = performance.now();
const tmpV = new THREE.Vector3();

function resize(){
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w,h,false);
  camera.aspect = w/h; camera.updateProjectionMatrix();
}
addEventListener('resize', resize); resize();

function frame(now){
  requestAnimationFrame(frame);
  const dt = Math.min((now-last)/1000, 0.05); last = now;
  simTime += dt * speedMyrPerSec;
  materials.forEach(m=>m.uniforms.uTime.value = simTime);

  userIdle += dt;
  if(autoOrbit && userIdle > 3) sphGoal.theta += dt*0.035;
  applyCamera();

  // sun sprite
  sunPos(simTime, tmpV); sunSprite.position.copy(tmpV);
  const camD = camera.position.distanceTo(target);
  sunSprite.scale.setScalar(Math.max(0.5, camD*0.014));

  // labels
  for(const L of labels){
    L.getPos(simTime, L.v);
    const v = L.v.clone().project(camera);
    const behind = v.z > 1;
    if(!showLabels || behind || Math.abs(v.x)>1.1 || Math.abs(v.y)>1.1){
      L.el.style.display='none';
    } else {
      L.el.style.display='block';
      L.el.style.left = ((v.x*0.5+0.5)*innerWidth)+'px';
      L.el.style.top  = ((-v.y*0.5+0.5)*innerHeight)+'px';
    }
  }

  // readout: distance in light-years
  const dly = camD*UNIT;
  $('dist').textContent = dly>=1000 ? (dly/1000).toFixed(1)+' KLY' : Math.round(dly)+' LY';

  renderer.render(scene, camera);
}
requestAnimationFrame(frame);
setTimeout(()=>{ document.getElementById('fade').style.opacity = 0; }, 150);
</script>
</body>
</html>
